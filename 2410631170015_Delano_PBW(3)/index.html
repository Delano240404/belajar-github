<!DOCTYPE html>
<html>
<head>
<title>Tugas Javascript</title>

<style>
body {
    font-family: Arial;
    margin:40px;
}

h2{
    font-weight:bold;
}

table {
    border-collapse: collapse;
    width: 400px;
    margin-top:100px;
}

table, th, td{
    border:1px solid #999;
}

th, td {
    padding:8px;
    text-align:left;
}

th{
    background:#eee;
}

.from-box{
    margin-top:20px;
}

input{
    padding:5px;
    margin-top:5px;
    margin-bottom:10px;
}

button {
    padding: 6px 12px;
}

#hasil {
    margin-top:100px;
    font-weight:bold;
}
</style>

</head>
<body>
<table>
<tr>
<th>Rentang Nilai</th>
<th>Huruf Mutu</th>
</tr>

<tr>
<td>80 - 100</td>
<td>A</td>
</tr>

<tr>
<td>70 - 79</td>
<td>B</td>
</tr>

<tr>
<td>60 - 69</td>
<td>C</td>
</tr>

<tr>
<td>50 - 59</td>
<td>D</td>
</tr>

<tr>
<td>0 - 49</td>
<td>E</td>
</tr>
</table>

<p>
    Jika nilai yang dimasukan di luar rentang 0 - 100, tampilkan pesan
    error <b>Nilai tidak valid</b>
</p>

<div class="from=box">

<label>NIM:</label><br>
<input type="text" id="nim"><br>

<label>Nilai Mata Kuliah:</label><br>
<input type="number" id="nilai"><br>

<button onclick="cekNilai()">Cek Nilai</button>

<p id="hasil"></p>

</div>

<script>

function cekNilai() {

let nim = document.getElemetByid("nim").value;
let nilai = parseint(document.getElementByid("nilai").value);
let Huruf;

if(nilai < 0 || nilai > 100 || IsNaN(nilai)){
    document.getElementByid("hasil").innerHTML = "Nilai tidak valid";
    return;
}

if (nilai >= 80){
    huruf = "A";
}

else if (nilai >= 70){
    huruf = "B";
}

else if (nilai >= 60){
    huruf = "C";
}

else if (nilai >= 50){
    huruf = "D";
}

else {
    huruf = "E";
}

document.getElementByid("hasil").innerHTML =
    "NIM: " + nim + "<br>Huruf Mutu: " + huruf;
}
</script>

</body>
</html>
